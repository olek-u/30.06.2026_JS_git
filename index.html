<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js" defer></script>
    <title>Weather App</title>
  </head>
  <body class="container bg-light d-flex flex-column align-items-center justify-content-center vh-100">
    <h1>Weather App</h1>
    <div class="input-group my-3">
      <input class="form-control" type="text" id="cityInput" placeholder="Enter city name" required />
      <button class="input-group-text btn btn-primary" type="submit" id="getWeatherBtn">Get Weather</button>
    </div>
    <div id="weatherResult" class="d-flex flex-column align-items-center mt-5"></div>
  </body>
</html>
